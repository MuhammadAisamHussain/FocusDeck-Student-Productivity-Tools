<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCargoWorld — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
</head>
<body>

<div class="app-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">
            <img src="" alt="eCargoWorld" class="sidebar-logo-img" id="dashLogoEcw" data-slot="logo_ecw_url">
        </a>
        <ul class="sidebar-nav">
            <li><a href="#" class="active" data-screen="dashboard">Overview</a></li>
            <li><a href="#" data-screen="tasks" id="navTasks">Tasks <span class="nav-badge" id="taskBadge" style="display:none;">0</span></a></li>
            <li><a href="#" data-screen="shipments">Shipments</a></li>
            <li><a href="#" data-screen="rates">Rates</a></li>
            <li><a href="#" data-screen="flights" class="director-only" style="display:none;">Flights</a></li>
            <li><a href="#" data-screen="team" class="manager-only" style="display:none;">Team</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="admin.html" class="sidebar-admin-link manager-only" id="btnAdmin" style="display:none;">Admin Panel</a>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">U</div>
                <div>
                    <div class="user-name" id="userName">User</div>
                    <div class="user-role" id="roleBadge">Employee</div>
                </div>
            </div>
            <button class="btn-logout" id="btnLogout">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Screens loaded dynamically -->
    </main>
</div>

<!-- Task Detail Modal -->
<div class="modal-overlay" id="taskDetailPopup" style="display:none;">
    <div class="modal-panel">
        <div class="modal-header">
            <h3 id="taskDetailTitle">Task Details</h3>
            <button onclick="document.getElementById('taskDetailPopup').style.display='none'" class="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="taskDetailContent"></div>
        <div class="modal-body" id="taskProofSection" style="margin-top:0;"></div>
        <div class="modal-footer">
            <button class="btn" onclick="document.getElementById('taskDetailPopup').style.display='none'">Close</button>
            <button class="btn primary" id="taskDetailCompleteBtn">Mark Complete</button>
        </div>
    </div>
</div>

<!-- Status Change Modal -->
<div class="modal-overlay" id="statusPopup" style="display:none;">
    <div class="modal-panel" style="max-width:360px;">
        <div class="modal-header">
            <h3 id="statusPopupTitle">Change Status</h3>
            <button onclick="document.getElementById('statusPopup').style.display='none'" class="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="statusPopupOptions"></div>
    </div>
</div>

<!-- Notification Toast -->
<div id="notificationPopup" class="toast-notification" style="display:none;">
    <div class="toast-icon">&#128276;</div>
    <div>
        <strong>New Task Assigned</strong>
        <p id="notifTaskName"></p>
        <small id="notifTaskDeadline"></small>
    </div>
    <button onclick="document.getElementById('notificationPopup').style.display='none'" class="toast-close">&times;</button>
</div>

<script src="js/app.js"></script>
<script src="js/shipments.js"></script>
<script src="js/flights.js"></script>
<script src="js/tasks.js"></script>
</body>
</html>
